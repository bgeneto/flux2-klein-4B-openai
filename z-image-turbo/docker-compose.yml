services:
  zimage-turbo:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/zimage-turbo-sglang:latest
    container_name: zimage-turbo
    restart: unless-stopped

    ports:
      - "8006:8006"

    gpus: all
    ipc: host
    shm_size: "32gb"

    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /cache/huggingface

      CUDA_VISIBLE_DEVICES: "0"

      # SGLang internal configuration (not exposed to host)
      SG_LANG_HOST: 0.0.0.0
      SG_LANG_PORT: "30010"

      MODEL_PATH: Tongyi-MAI/Z-Image-Turbo

      # fast = lower latency; lowvram = text encoder CPU offload + VAE tiling/slicing
      ZIMAGE_MODE: fast

      # RTX 3090: int4. Use rank 32 for fastest, 128 for better quality.
      ZIMAGE_PRECISION: int4
      ZIMAGE_RANK: "32"

      NUM_INFERENCE_STEPS: "8"
      GUIDANCE_SCALE: "0.0"

      DEFAULT_HEIGHT: "1024"
      DEFAULT_WIDTH: "1024"

      DIT_PRECISION: bf16
      VAE_PRECISION: fp16

      # FastAPI configuration (exposed to host on port 8006)
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: "8006"

      # API key for authentication
      API_KEY: ${API_KEY:-sk-local}

      LOG_LEVEL: ${LOG_LEVEL:-info}

    volumes:
      - ~/.cache/huggingface:/cache/huggingface
      - ./weights:/weights
